name: Podcast Automation
on:
  schedule:
    - cron: '0 */3 * * *' # تحديث كل 3 ساعات
  workflow_dispatch:

jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تحديث للإصدار الرابع
        with:
          fetch-depth: 0 # مهم جداً لجلب كل التحديثات ومنع مشاكل الـ Push

      - uses: actions/setup-python@v5 # تحديث للإصدار الخامس
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install feedparser groq edge-tts
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Update Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # التأكد من وجود تغييرات قبل الـ commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto Update RSS"
            git pull origin main --rebase # سحب التحديثات لضمان عدم حدوث تعارض
            git push origin main
          fi

      - name: Release
        uses: softprops/action-gh-release@v2 # تحديث للإصدار الثاني
        if: success() # لن يتم عمل Release إلا إذا نجحت الخطوات السابقة
        with:
          tag_name: v${{ github.run_number }}
          files: episode.mp3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
